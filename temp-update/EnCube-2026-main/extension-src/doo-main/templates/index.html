<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DOO / COO Helper</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
  <h1>⚙️ DOO / COO Helper</h1>
  <p class="sub-text">Select a scenario and view the process.</p>

  <form method="POST">
    <label>Select Scenario:</label>
    <select name="scenario" required>
      <option disabled selected>-- Choose an Option --</option>
      <option value="1">1. Lease A → Lease B</option>
      <option value="2">2. Lease/PPA → Residential</option>
      <option value="3">3. Site Misconfigured</option>
      <option value="4">4. Other Scenarios</option>
      <option value="5">5. Exceptions (Death / Divorce / Family / Commercial Changes)</option>
      <option value="6">6. Sold System / Remove Owner</option>
      <option value="7">7. Payment Issues</option>
    </select>

    <div class="button-group">
      <button type="submit" name="action" value="details">
        View Process
      </button>
    </div>
  </form>
</div>

<button class="dark-toggle" onclick="toggleDark()">🌙</button>

<script>
function toggleDark() {
  document.body.classList.toggle("dark");

  // ✅ Save preference
  if (document.body.classList.contains("dark")) {
    localStorage.setItem("theme", "dark");
  } else {
    localStorage.setItem("theme", "light");
  }
}

// ✅ Apply saved theme on load
window.onload = function () {
  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
  }
};
</script>

</body>
</html>
