<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email & SFDC Case Generator</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="container">
        <!-- Header with Username Display -->
        <div class="header">
            <h1>Email & SFDC Generator</h1>
            <div class="username-section">
                <span class="username-label">Logged in as:</span>
                <span id="username-display" class="username-display">Loading...</span>
                <button id="change-username-btn" class="btn-small" title="Change username">✏️</button>
            </div>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <div class="form-group">
                <label for="issue-input" class="required">Customer Issue Subject & Description</label>
                <textarea 
                    id="issue-input" 
                    class="textarea" 
                    placeholder="Enter the customer issue subject and complete description. Example: 4 MIs underproducing, system showing low production for past 3 days"
                    rows="4"
                ></textarea>
            </div>

            <div class="form-group">
                <label for="troubleshooting-input" class="required">Solution / Troubleshooting Steps</label>
                <textarea 
                    id="troubleshooting-input" 
                    class="textarea" 
                    placeholder="Enter the solution or troubleshooting steps already performed. Leave empty for AI to infer steps from the issue."
                    rows="4"
                ></textarea>
            </div>

            <div class="case-details">
                <div class="case-detail-group">
                    <label for="case-id">Case ID (Optional)</label>
                    <input type="text" id="case-id" placeholder="XXXX">
                </div>
                <div class="case-detail-group">
                    <label for="customer-name">Customer Name (Optional)</label>
                    <input type="text" id="customer-name" placeholder="Customer Name">
                </div>
                <div class="case-detail-group">
                    <label for="system-name">System/Site Name (Optional)</label>
                    <input type="text" id="system-name" placeholder="System/Site Name">
                </div>
                <div class="case-detail-group">
                    <label for="site-id">Site ID (Optional)</label>
                    <input type="text" id="site-id" placeholder="Site ID">
                </div>
            </div>

            <div class="button-container">
                <button id="generate-btn" class="btn btn-primary">✨ Generate Email & Case Comment</button>
                <button id="clear-all-btn" class="btn btn-secondary" title="Clear all saved data">🗑️ Clear All</button>
            </div>
        </div>

        <!-- Output Section (Hidden by default) -->
        <div id="output-section" class="output-section hidden">
            <!-- Email Output -->
            <div class="output-card">
                <div class="output-header">
                    <h2>📧 Email Draft</h2>
                    <button id="copy-email-btn" class="btn-copy" title="Copy to clipboard">📋 Copy Email</button>
                </div>
                <textarea id="email-output" class="textarea output-textarea" readonly></textarea>
            </div>

            <!-- SFDC Case Comment Output -->
            <div class="output-card">
                <div class="output-header">
                    <h2>📋 SFDC Case Comment</h2>
                    <button id="copy-case-btn" class="btn-copy" title="Copy to clipboard">📋 Copy Comment</button>
                </div>
                <textarea id="case-output" class="textarea output-textarea" readonly></textarea>
            </div>

            <!-- Regenerate Button -->
            <button id="regenerate-btn" class="btn btn-secondary">🔄 Regenerate</button>
        </div>

        <!-- Loading Indicator -->
        <div id="loading-indicator" class="loading-indicator hidden">
            <div class="spinner"></div>
            <p>Generating content...</p>
        </div>

        <!-- Error Message -->
        <div id="error-message" class="error-message hidden"></div>

        <!-- Success Message -->
        <div id="success-message" class="success-message hidden"></div>
    </div>

    <!-- Username Modal -->
    <div id="username-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Enter Your Username</h2>
            <input type="text" id="username-input" class="input-username" placeholder="Your name/username" autofocus>
            <div class="modal-buttons">
                <button id="modal-cancel-btn" class="btn btn-secondary">Cancel</button>
                <button id="modal-save-btn" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
